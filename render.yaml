services:
  - type: web
    name: the-vlog-backend
    env: node
    plan: starter
    region: oregon
    rootDir: .
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000
      - key: IS_PROXIED
        value: true
      - key: APP_KEYS
        generateValue: true
      - key: API_TOKEN_SALT
        generateValue: true
      - key: ADMIN_JWT_SECRET
        generateValue: true
      - key: TRANSFER_TOKEN_SALT
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_CLIENT
        value: postgres
      - key: DATABASE_URL
        fromDatabase:
          name: the-vlog-postgres
          property: connectionString
      - key: DATABASE_SSL
        value: true
      - key: DATABASE_SSL_SELF
        value: true
      - key: NETLIFY_BUILD_HOOK_URL
        sync: false
      - key: REBUILD_DEBOUNCE_MS
        value: 15000
    disk:
      name: uploads
      mountPath: /opt/render/project/src/public/uploads
      sizeGB: 1

databases:
  - name: the-vlog-postgres
    plan: starter